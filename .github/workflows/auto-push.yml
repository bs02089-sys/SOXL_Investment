name: Daily Sigma Alert

on:
  schedule:
    - cron: '0 10 * * *'        # 매일 한국시간 오후 7시 (UTC 10:00)
  workflow_dispatch:           # 수동으로도 실행 가능

jobs:
  run-sigma-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance numpy requests python-dotenv

      - name: Run Sigma Alert Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python sigma_alert.py     # ← 당신의 실제 파일명으로 변경하세요

      - name: Notify if failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log("❌ Sigma Alert 실행 실패")
