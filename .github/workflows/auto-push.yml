name: Daily Sigma Alert

on:
  schedule:
    - cron: '0 10 * * *'    # 한국시간 오후 7시
  workflow_dispatch:

jobs:
  run-sigma-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance numpy requests python-dotenv tzdata

      - name: Run Sigma Alert Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python BITU_SOXL_sigma_alert.py

      - name: Notify if failed
        if: failure()
        run: echo "❌ Job failed with exit code 2"
