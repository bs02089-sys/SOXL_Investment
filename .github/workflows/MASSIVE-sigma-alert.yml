name: Daily Sigma Alert (MASSIVE)

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  run-sigma-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install numpy requests python-dotenv

      - name: Run MASSIVE Sigma Alert
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: python TQQQ_SOXL_sigma_alert.py
